<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="./css/responsive.css" />
    <script src="https://kit.fontawesome.com/aae2fd00d2.js" crossorigin="anonymous"></script>
    <title>Document</title>
</head>
<body>
    <!--menu-->
    <div class="container">
        <section id="form" class="m-5">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Inserisci i tuoi dati</h5>
                    <hr>
                    <div class="row row-cols-3">
                        <div class="mb-3">
                            <label for="name" class="name">Nome</label>
                            <input type="text" class="form-control" id="name" value="Giorgio">
                        </div>
                        <div class="mb-3">
                            <label for="kms" class="name">Chilometri</label>
                            <input type="number" class="form-control" id="kms" value="35" min="1" max="1000" step="1">
                        </div>
                        <div class="mb-3">
                            <label for="age" class="name">Fascia d'età</label>
                            <select class="form-select" id="age">
                                <option selected>Open this select menu</option>
                                <option value="min">Maggiorenne</option>
                                <option value="mag">Minorenne</option>
                                <option value="over">Over 65</option>
                              </select>
                        </div>
                    </div>
                </div>
                <div class="card-footer d-flex justify-content-end">
                    <button type="button" class="btn btn-secondary me-3" id="cancel-button">Annulla</button>
                    <button type="button" class="btn btn-primary" id="confirm-button">Conferma</button>
                </div>
            </div>
        </section>


    <!--ticket-->
        <section id="ticket-section" class="m-5">

        </section>
    </div>
    <!--java script-->
    <script src="js/script.js"></script>
</body>
</html>
